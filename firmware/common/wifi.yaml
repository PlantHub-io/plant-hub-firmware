# common/wifi.yaml
# WiFi configuration with fallback AP and captive portal
# AP stays active until device is fully provisioned (claimed + MQTT connected)

wifi:
  # mDNS support — hostname is set dynamically to planthub-{nodeId}.local
  # after provisioning via mdns_hostname_set() in provisioning.yaml
  domain: .local

  # No default WiFi configured - device starts in AP mode immediately
  # User connects to AP and configures WiFi via captive portal
  # After WiFi is configured via portal, it connects to that network
  output_power: 20dB

  # Prevent reboots when WiFi drops — needed during provisioning
  reboot_timeout: 0s

  # Enable AP mode immediately — no password for easy first-time setup
  ap:
    # Do not set a static channel, let ESPHome pick one to avoid conflicts
    # channel: 1
    # Keep AP running indefinitely — user needs to see claim code
    ap_timeout: 0s

  # When WiFi STA connects, trigger self-registration if not provisioned
  on_connect:
    then:
      - lambda: |-
          ESP_LOGI("wifi-dbg", "on_connect fired: provisioning_complete=%s, provisioning_state=%s",
                   id(provisioning_complete) ? "true" : "false",
                   id(provisioning_state).c_str());
      - if:
          condition:
            lambda: 'return !id(provisioning_complete) && id(provisioning_state) != "WAITING_CLAIM";'
          then:
            - logger.log: "WiFi connected, re-enabling AP + captive portal for provisioning..."
            - lambda: |-
                // Set state to REGISTERING immediately so when the captive portal
                // HTML loads, /provision-status returns the right state and the
                // page shows "Registering..." instead of the WiFi selector.
                id(provisioning_state) = "REGISTERING";
                id(provisioning_status_sensor).publish_state("REGISTERING");
                ESP_LOGI("wifi-dbg", "State set to REGISTERING, re-enabling AP...");

                // Re-enable AP + captive portal. The WiFi component tears down
                // both when STA connects; we bring them back up so Android keeps
                // the captive-portal detection alive and the user can still see
                // the claim code. Helper lives in common/wifi_ap_access.h
                // because WiFiComponent is `final` in ESPHome 2026.x.
                planthub::reenable_wifi_ap();
            - delay: 2s
            - script.execute: self_register

# Captive portal for WiFi setup
captive_portal:

# Improv for serial provisioning (removed to prevent AP conflicts)
# improv_serial:
