# sensors/bmp280.yaml
# BMP280 I2C sensor — temperature + pressure (no humidity; that's the BME280).
#
# Required substitutions:
#   ${i2c_sda_pin}            — I2C SDA GPIO
#   ${i2c_scl_pin}            — I2C SCL GPIO
#   ${bmp280_address}         — I2C address: "0x76" (default, SDO low) or "0x77" (SDO high)
#   ${sensor_update_interval} — how often to read (e.g. 60s)
#
# Wiring:
#   SDA → ${i2c_sda_pin}
#   SCL → ${i2c_scl_pin}
#   VCC → 3.3V
#   GND → GND
#
# Do NOT include this alongside sensors/bme280.yaml — they declare overlapping
# IDs ("temperature", "pressure") and both want to own the I2C bus.

i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: true
  frequency: 100kHz

sensor:
  - platform: bmp280_i2c
    address: ${bmp280_address}
    update_interval: ${sensor_update_interval}

    temperature:
      name: "Temperature"
      id: temperature
      oversampling: 2x
      on_value:
        then:
          - lambda: |-
              if (std::isnan(x)) return;
              id(sensor_values)["temperature"] = x;
              id(evaluate_rules).execute(std::string("temperature"), x);

    pressure:
      name: "Pressure"
      id: pressure
      oversampling: 2x
      on_value:
        then:
          - lambda: |-
              if (std::isnan(x)) return;
              id(sensor_values)["pressure"] = x;
              id(evaluate_rules).execute(std::string("pressure"), x);
