# devices/mock-weather-station.yaml
#
# PlantHub Mock Device — Garden Weather Station (ESP32-C3 Zero)
#
# No physical sensors required! This config uses mock sensor generators
# that produce realistic random data, letting you test the full PlantHub
# pipeline (provisioning, MQTT, dashboard, AI agent) without any hardware
# beyond the ESP32 board itself.
#
# Sensors (mock): Wind Speed, Rainfall, UV Index, Air Temperature, Ambient Light
# Actuators:      Grow Light (GPIO3 relay), Mist Sprayer (GPIO4 relay)
#
# ============================================
# WIRING (optional — only if you want actuators to physically work)
# ============================================
#
#   ESP32-C3 Zero     Component
#   -------------     ---------
#   GPIO3          →  Grow Light Relay IN
#   GPIO4          →  Mist Sprayer Relay IN
#   3.3V           →  Sensor VCC
#   5V             →  Relay module VCC
#   GND            →  Common GND
#
# Without relays wired, the device still registers, streams mock sensor
# data, and accepts actuator commands (they just don't do anything physical).
#
# ============================================
# FLASH
# ============================================
#
#   esphome run firmware/devices/mock-weather-station.yaml
#
# Then follow the provisioning flow in the top-level README.md.
#

substitutions:
  # Device identity (static)
  device_id: "planthub-c3-002"
  device_name: "PlantHub Weather Station"
  hardware_version: "esp32c3-zero-v1"
  firmware_version: "1.1.0"

  # Backend configuration (from secrets.yaml)
  backend_url: !secret backend_url
  device_provisioning_key: !secret device_provisioning_key

  # Pin mappings — ESP32-C3 Zero / SuperMini
  light_pin: GPIO3
  sprayer_pin: GPIO4
  status_led_pin: GPIO8
  factory_reset_pin: GPIO9

  # Timing
  sensor_update_interval: "30s"
  telemetry_interval: "60s"
  light_max_duration: "3600"
  sprayer_max_duration: "300"

  # Capabilities JSON for this device
  capabilities_sensors: |-
    msg += "{\"sensorKey\":\"windSpeed\",\"sensorType\":\"anemometer\",\"unit\":\"km/h\",\"displayName\":\"Wind Speed\",\"minValue\":0,\"maxValue\":60,\"precision\":0.1},";
    msg += "{\"sensorKey\":\"rainfall\",\"sensorType\":\"rain_gauge\",\"unit\":\"mm\",\"displayName\":\"Rainfall\",\"minValue\":0,\"maxValue\":50,\"precision\":0.1},";
    msg += "{\"sensorKey\":\"uvIndex\",\"sensorType\":\"uv_sensor\",\"unit\":\"UV\",\"displayName\":\"UV Index\",\"minValue\":0,\"maxValue\":11,\"precision\":0.1},";
    msg += "{\"sensorKey\":\"airTemp\",\"sensorType\":\"thermometer\",\"unit\":\"\u00b0C\",\"displayName\":\"Air Temperature\",\"minValue\":-10,\"maxValue\":50,\"precision\":0.1},";
    msg += "{\"sensorKey\":\"ambientLight\",\"sensorType\":\"ldr\",\"unit\":\"lx\",\"displayName\":\"Ambient Light\",\"minValue\":0,\"maxValue\":80000,\"precision\":1}";

  capabilities_actuators: |-
    msg += "{\"actuatorKey\":\"growLight\",\"actuatorType\":\"relay\",\"displayName\":\"Grow Light\",\"supportedCommands\":[\"ON\",\"OFF\"],\"controlType\":\"BINARY\",\"durationSupported\":true,\"maxDurationSeconds\":${light_max_duration}},";
    msg += "{\"actuatorKey\":\"mistSprayer\",\"actuatorType\":\"relay\",\"displayName\":\"Mist Sprayer\",\"supportedCommands\":[\"ON\",\"OFF\"],\"controlType\":\"BINARY\",\"durationSupported\":true,\"maxDurationSeconds\":${sprayer_max_duration}}";

  # Command router for this device's actuators
  command_router: |-
    if (actuator == "growLight") {
      if (durationSeconds > 0) {
        int clamped = durationSeconds > ${light_max_duration} ? ${light_max_duration} : durationSeconds;
        ESP_LOGI("command", "[growLight] TIMED ON for %d seconds (requested=%d, max=${light_max_duration})", clamped, durationSeconds);
        id(light_timed).execute(clamped);
      } else if (action == "ON") {
        ESP_LOGI("command", "[growLight] ON (no duration, auto-off in ${light_max_duration}s)");
        id(grow_light).turn_on();
      } else if (action == "OFF") {
        ESP_LOGI("command", "[growLight] OFF");
        id(grow_light).turn_off();
      } else {
        ESP_LOGW("command", "[growLight] Unknown action: %s", action.c_str());
      }
    } else if (actuator == "mistSprayer") {
      if (durationSeconds > 0) {
        int clamped = durationSeconds > ${sprayer_max_duration} ? ${sprayer_max_duration} : durationSeconds;
        ESP_LOGI("command", "[mistSprayer] TIMED ON for %d seconds (requested=%d, max=${sprayer_max_duration})", clamped, durationSeconds);
        id(sprayer_timed).execute(clamped);
      } else if (action == "ON") {
        ESP_LOGI("command", "[mistSprayer] ON (no duration, auto-off in ${sprayer_max_duration}s)");
        id(mist_sprayer).turn_on();
      } else if (action == "OFF") {
        ESP_LOGI("command", "[mistSprayer] OFF");
        id(mist_sprayer).turn_off();
      } else {
        ESP_LOGW("command", "[mistSprayer] Unknown action: %s", action.c_str());
      }
    } else {
      ESP_LOGW("command", "Unknown actuator: %s (action=%s)", actuator.c_str(), action.c_str());
    }

# Board
esp32:
  board: esp32-c3-devkitm-1
  partitions: ../partitions.csv
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP_MQTT_ENABLED: "y"
      CONFIG_MQTT_TRANSPORT_SSL: "y"
      CONFIG_MQTT_TRANSPORT_WEBSOCKET: "n"
      CONFIG_MQTT_TRANSPORT_WEBSOCKET_SECURE: "n"
    advanced:
      include_builtin_idf_components:
        - nvs_flash
        - mqtt

# Include all common packages
packages:
  base: !include ../common/base.yaml
  wifi: !include ../common/wifi.yaml
  ble: !include ../common/ble_provisioning.yaml
  provisioning: !include ../common/provisioning.yaml
  globals: !include ../common/globals.yaml
  status: !include ../common/status.yaml
  led: !include ../common/led_status.yaml

  # Mock sensors for testing without hardware
  mock: !include ../sensors/mock_sensors_weather.yaml
  light: !include ../actuators/grow_light.yaml
  sprayer: !include ../actuators/mist_sprayer.yaml
